<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Bible Verse</title>
    <meta name="description" content="Um aplicativo de versículos bíblicos construído com boas práticas DevOps.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>Bible Verse App - DevOps Version  foii</h1>
            <p class="subtitle">Inspiração diária </p>
        </header>

        <main class="verse-card glass">
            <div id="loading" class="hidden">
                <div class="spinner"></div>
            </div>
            <div id="verse-content">
                <p id="verse-text" class="verse-text">Clique no botão abaixo para receber uma palavra.</p>
            </div>
            <button id="new-verse-btn" class="glass-btn">
                <span>Novo Versículo</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
            </button>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
